name: 🏗️ Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            suffix: linux-arm
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: 🏗️ Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-${{ matrix.suffix }}"
          go build -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o "$output" ./cmd/picoclaw
          ls -la "$output"
          file "$output"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-${{ matrix.suffix }}
          path: picoclaw-${{ matrix.suffix }}
          retention-days: 7

  release:
    name: 🚀 Create Release
    needs: build-binaries
    runs-on: self-hosted
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          pattern: picoclaw-*

      - name: 📝 Prepare Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## 🦞 PicoClaw Release

          ### What's New
          - Kimi 2.5 (kimi-coding) provider support
          - Anthropic Messages API streaming support
          - Docker deployment ready
          - Coolify template included

          ### Installation

          **Linux/macOS:**
          ```bash
          # Download binary
          curl -L -o picoclaw https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/picoclaw-linux-amd64
          chmod +x picoclaw
          sudo mv picoclaw /usr/local/bin/
          ```

          **Docker:**
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```

          ### Usage
          ```bash
          # Test with Kimi
          picoclaw agent -m "Hello from Kimi 2.5!"

          # Start gateway
          picoclaw gateway
          ```

          ### Checksums
          See `checksums.txt` for SHA256 checksums of all binaries.
          EOF

      - name: 🔐 Generate Checksums
        run: |
          cd binaries
          find . -type f -exec sha256sum {} \; > ../checksums.txt
          cat ../checksums.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PicoClaw ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            binaries/picoclaw-*/picoclaw-*
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Summary
        run: |
          echo "## 🎉 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Binaries:**" >> $GITHUB_STEP_SUMMARY
          ls -1 binaries/picoclaw-*/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
