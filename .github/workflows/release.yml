name: 🚀 Build Release & Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            suffix: linux-arm

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: 🏗️ Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-${{ matrix.suffix }}"
          go build -ldflags="-w -s -X main.version=${{ github.ref_name }}" -o "$output" ./cmd/picoclaw
          ls -la "$output"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-${{ matrix.suffix }}
          path: picoclaw-${{ matrix.suffix }}
          retention-days: 1

  release:
    name: Create Release
    needs: build-binaries
    runs-on: self-hosted
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: picoclaw-*

      - name: 📁 Organize Binaries
        run: |
          mkdir -p release
          cp dist/*/picoclaw-* release/
          cp install.sh release/
          ls -la release/

      - name: 🔐 Generate Checksums
        run: |
          cd release
          sha256sum * > ../checksums.txt
          cat ../checksums.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PicoClaw ${{ github.ref_name }}
          files: |
            release/*
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build Docker Images
    needs: build-binaries
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download Binary
        uses: actions/download-artifact@v4
        with:
          name: picoclaw-${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || matrix.platform == 'linux/arm64' && 'linux-arm64' || 'linux-arm' }}
          path: ./

      - name: 🏗️ Prepare Binary
        run: |
          mv picoclaw-* picoclaw
          chmod +x picoclaw
          ls -la picoclaw

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 🚀 Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: 📋 Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

  merge-docker:
    name: Merge Docker Manifests
    needs: build-docker
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: 📥 Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*

      - name: 🔗 Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: 📋 Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
