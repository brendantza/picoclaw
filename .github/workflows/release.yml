name: 🚀 Build Release & Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Determine version to use
  # ─────────────────────────────────────────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: self-hosted
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build binaries for all platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.suffix }})
    needs: version
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: 📝 Run go generate
        run: go generate ./...

      - name: 🏗️ Build picoclaw
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-${{ matrix.suffix }}"
          version="${{ needs.version.outputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw
          echo "Built picoclaw:"
          ls -la "$output"
          file "$output"

      - name: 🏗️ Build picoclaw-launcher
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-launcher-${{ matrix.suffix }}"
          version="${{ needs.version.outputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw-launcher
          echo "Built picoclaw-launcher:"
          ls -la "$output"
          file "$output"

      - name: 🏗️ Build picoclaw-launcher-tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-launcher-tui-${{ matrix.suffix }}"
          version="${{ needs.version.outputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw-launcher-tui
          echo "Built picoclaw-launcher-tui:"
          ls -la "$output"
          file "$output"

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            picoclaw-${{ matrix.suffix }}
            picoclaw-launcher-${{ matrix.suffix }}
            picoclaw-launcher-tui-${{ matrix.suffix }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with binaries
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [version, build-binaries]
    runs-on: self-hosted
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: binaries-*

      - name: 📁 Prepare Release Files
        run: |
          mkdir -p release
          # Copy all binaries from artifacts
          for dir in artifacts/binaries-*/; do
            if [ -d "$dir" ]; then
              cp "$dir"/picoclaw-* release/ 2>/dev/null || true
            fi
          done
          # Copy install script and README
          cp install.sh release/
          cp README.md release/
          echo "Release files:"
          ls -la release/

      - name: 🚀 Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PicoClaw ${{ needs.version.outputs.version }}
          tag_name: ${{ needs.version.outputs.version }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push Docker images
  # ─────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker (${{ matrix.platform }})
    needs: [version, create-release]
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            artifact: linux-amd64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download Binary
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.artifact }}
          path: ./

      - name: 🏗️ Prepare Binary
        run: |
          mv picoclaw-${{ matrix.artifact }} picoclaw
          chmod +x picoclaw
          ls -la picoclaw
          file picoclaw

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Build and push (${{ matrix.platform }})
        run: |
          version="${{ needs.version.outputs.version }}"
          platform="${{ matrix.platform }}"
          arch="${{ matrix.artifact }}"
          
          echo "Building for ${platform}..."
          echo "Tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}-${arch}"
          
          # Build and push
          docker buildx build \
            --platform "${platform}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}-${arch}" \
            --push \
            .
          
          echo "✅ Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}-${arch}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Merge platform-specific images into multi-arch manifest
  # ─────────────────────────────────────────────────────────────────────────────
  merge-docker:
    name: Merge Docker Manifests
    needs: [version, build-docker]
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Create Multi-Arch Manifest
        run: |
          version="${{ needs.version.outputs.version }}"
          repo="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          
          # For single platform, just tag the image
          echo "Tagging single-platform image..."
          docker buildx imagetools create \
            -t "${repo}:${version}" \
            -t "${repo}:latest" \
            "${repo}:${version}-linux-amd64"
          
          echo ""
          echo "✅ Multi-arch image created:"
          echo "  - ${repo}:${version}"
          echo "  - ${repo}:latest"

      - name: 📋 Verify Manifest
        run: |
          version="${{ needs.version.outputs.version }}"
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}"
