name: 🚀 Build Release & Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAME: picoclaw

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build binaries for all platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.suffix }})
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            suffix: linux-arm

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: 🏗️ Build picoclaw
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-${{ matrix.suffix }}"
          version="${{ github.ref_name || github.event.inputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw
          echo "Built picoclaw:"
          ls -la "$output"
          file "$output"

      - name: 🏗️ Build picoclaw-launcher
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-launcher-${{ matrix.suffix }}"
          version="${{ github.ref_name || github.event.inputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw-launcher
          echo "Built picoclaw-launcher:"
          ls -la "$output"
          file "$output"

      - name: 🏗️ Build picoclaw-launcher-tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output="picoclaw-launcher-tui-${{ matrix.suffix }}"
          version="${{ github.ref_name || github.event.inputs.version }}"
          go build -ldflags="-w -s -X main.version=${version}" -o "$output" ./cmd/picoclaw-launcher-tui
          echo "Built picoclaw-launcher-tui:"
          ls -la "$output"
          file "$output"

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            picoclaw-${{ matrix.suffix }}
            picoclaw-launcher-${{ matrix.suffix }}
            picoclaw-launcher-tui-${{ matrix.suffix }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with binaries
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: self-hosted
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: binaries-*

      - name: 📁 Prepare Release Files
        run: |
          mkdir -p release
          # Copy all binaries from artifacts
          for dir in artifacts/binaries-*/; do
            if [ -d "$dir" ]; then
              cp "$dir"/picoclaw-* release/ 2>/dev/null || true
            fi
          done
          # Copy install script and README
          cp install.sh release/
          cp README.md release/
          echo "Release files:"
          ls -la release/

      - name: 🚀 Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PicoClaw ${{ github.ref_name || github.event.inputs.version }}
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push Docker images (downloads from GitHub release)
  # ─────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker (${{ matrix.platform }})
    needs: create-release
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push (${{ matrix.platform }})
        run: |
          version="${{ github.ref_name || github.event.inputs.version }}"
          platform="${{ matrix.platform }}"
          arch="${{ matrix.arch }}"
          
          # Build args
          build_args="--build-arg VERSION=${version}"
          build_args="${build_args} --build-arg GITHUB_REPO=${{ github.repository }}"
          
          # Tags for both registries
          ghcr_tags="-t ${{ env.GHCR_REGISTRY }}/${{ github.repository }}:${version}-${arch}"
          dh_tags="-t ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${version}-${arch}"
          
          echo "Building for ${platform}..."
          echo "GHCR: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}:${version}-${arch}"
          echo "DockerHub: ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${version}-${arch}"
          
          # Build and push
          docker buildx build \
            --platform "${platform}" \
            ${build_args} \
            ${ghcr_tags} \
            ${dh_tags} \
            --push \
            .
          
          echo "✅ Pushed platform-specific images"

  # ─────────────────────────────────────────────────────────────────────────────
  # Merge platform-specific images into multi-arch manifest
  # ─────────────────────────────────────────────────────────────────────────────
  merge-docker:
    name: Merge Docker Manifests
    needs: build-docker
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔗 Create Multi-Arch Manifests
        run: |
          version="${{ github.ref_name || github.event.inputs.version }}"
          
          ghcr_repo="${{ env.GHCR_REGISTRY }}/${{ github.repository }}"
          dh_repo="${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          
          # Build manifest lists from available platforms
          ghcr_manifests=""
          dh_manifests=""
          
          for arch in amd64 arm64; do
            tag="${version}-${arch}"
            
            # Check GHCR
            echo "Checking ${ghcr_repo}:${tag}..."
            if docker manifest inspect "${ghcr_repo}:${tag}" > /dev/null 2>&1; then
              echo "  ✓ GHCR found"
              ghcr_manifests="${ghcr_manifests} ${ghcr_repo}:${tag}"
            fi
            
            # Check Docker Hub
            echo "Checking ${dh_repo}:${tag}..."
            if docker manifest inspect "${dh_repo}:${tag}" > /dev/null 2>&1; then
              echo "  ✓ DockerHub found"
              dh_manifests="${dh_manifests} ${dh_repo}:${tag}"
            fi
          done
          
          # Create GHCR manifest
          if [ -n "$ghcr_manifests" ]; then
            echo ""
            echo "Creating GHCR multi-arch manifest..."
            docker buildx imagetools create \
              -t "${ghcr_repo}:${version}" \
              -t "${ghcr_repo}:latest" \
              ${ghcr_manifests}
            echo "✅ GHCR: ${ghcr_repo}:${version}"
          fi
          
          # Create Docker Hub manifest
          if [ -n "$dh_manifests" ]; then
            echo ""
            echo "Creating DockerHub multi-arch manifest..."
            docker buildx imagetools create \
              -t "${dh_repo}:${version}" \
              -t "${dh_repo}:latest" \
              ${dh_manifests}
            echo "✅ DockerHub: ${dh_repo}:${version}"
          fi

      - name: 📋 Verify Manifests
        run: |
          version="${{ github.ref_name || github.event.inputs.version }}"
          
          echo "=== GHCR ==="
          docker buildx imagetools inspect "${{ env.GHCR_REGISTRY }}/${{ github.repository }}:${version}" || true
          
          echo ""
          echo "=== DockerHub ==="
          docker buildx imagetools inspect "${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${version}" || true
