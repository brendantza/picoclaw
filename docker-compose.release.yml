# ============================================================
# PicoClaw Docker Compose - Release Binary Version
# ============================================================
# This uses the pre-built release binary instead of compiling
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.release.yml up -d
#
# Or directly:
#   docker-compose -f docker-compose.release.yml up -d
# ============================================================

services:
  picoclaw:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        - VERSION=${PICOCLAW_VERSION:-latest}
        - GITHUB_OWNER=${GITHUB_OWNER:-brendantza}
        - GITHUB_REPO=${GITHUB_REPO:-picoclaw}
    image: picoclaw:release
    container_name: picoclaw-release
