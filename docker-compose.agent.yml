version: '3.8'

services:
  picoclaw-agent:
    image: ghcr.io/brendantza/picoclaw:dev
    container_name: picoclaw-dev-agent
    restart: unless-stopped
    # Run launcher in agent mode - it will connect to controller and manage agent
    environment:
      - MODE=launcher
      - PICOCLAW_HOME=/home/picoclaw/.picoclaw
      # Team configuration
      - PICOCLAW_TEAM_ID=${PICOCLAW_TEAM_ID:-Development-Team-67d82e93}
      - PICOCLAW_TEAM_KEY=${PICOCLAW_TEAM_KEY:-pk_team_MK2-SdlgjeX0Mwt0BrkHKPY1DPs2ZJ6tj9xfkMs5NUM=}
      - PICOCLAW_CONTROLLER_ADDRESS=${PICOCLAW_CONTROLLER_ADDRESS:-http://192.168.6.122:18800}
      - PICOCLAW_GATEWAY_ADDRESS=${PICOCLAW_GATEWAY_ADDRESS:-http://192.168.6.122:18790}
      - PICOCLAW_AGENT_ROLE=${PICOCLAW_AGENT_ROLE:-fullstack}
      - PICOCLAW_AGENT_ID=${PICOCLAW_AGENT_ID:-dev-agent-docker}
      # API Key for agent to use (optional - can be configured via UI)
      - PICOCLAW_PROVIDERS_KIMI_CODING_API_KEY=${PICOCLAW_PROVIDERS_KIMI_CODING_API_KEY:-}
    ports:
      - '18801:18800'  # Launcher UI on local port 18801
    volumes:
      - picoclaw-agent-data:/home/picoclaw/.picoclaw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  picoclaw-agent-data:
