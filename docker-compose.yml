# ============================================================
# PicoClaw Docker Compose
# ============================================================
# 
# This uses the pre-built image from GitHub Container Registry.
# The image contains only the compiled binary, no source code.
#
# Usage:
#   docker-compose up -d
#
# Environment Variables:
#   PICOCLAW_IMAGE - Docker image to use (default: ghcr.io/brendantza/picoclaw:latest)
#   PICOCLAW_PORT - Port to expose (default: 18790)
#   PICOCLAW_PROVIDERS_KIMI_CODING_API_KEY - Kimi API key (required for Kimi)
#   PICOCLAW_PROVIDERS_KIMI_CODING_API_BASE - Kimi API base URL (default: https://api.kimi.com/coding)
#   PICOCLAW_PROVIDERS_KIMI_CODING_PROXY - HTTP proxy for Kimi (optional)
#   PICOCLAW_AGENTS_DEFAULTS_MODEL_NAME - Default model to use (default: kimi-k2.5)
# ============================================================

services:
  picoclaw:
    image: ${PICOCLAW_IMAGE:-ghcr.io/brendantza/picoclaw:latest}
    container_name: picoclaw
    restart: unless-stopped
    
    ports:
      - "${PICOCLAW_PORT:-18790}:18790"
    
    environment:
      # PicoClaw home directory
      - PICOCLAW_HOME=/home/picoclaw/.picoclaw
      
      # Default model configuration
      - PICOCLAW_AGENTS_DEFAULTS_MODEL_NAME=${PICOCLAW_AGENTS_DEFAULTS_MODEL_NAME:-kimi-k2.5}
      
      # Kimi Coding Provider Configuration
      - PICOCLAW_PROVIDERS_KIMI_CODING_API_KEY=${PICOCLAW_PROVIDERS_KIMI_CODING_API_KEY:-}
      - PICOCLAW_PROVIDERS_KIMI_CODING_API_BASE=${PICOCLAW_PROVIDERS_KIMI_CODING_API_BASE:-https://api.kimi.com/coding}
      - PICOCLAW_PROVIDERS_KIMI_CODING_PROXY=${PICOCLAW_PROVIDERS_KIMI_CODING_PROXY:-}
      
      # Timezone
      - TZ=${TZ:-Asia/Shanghai}
    
    volumes:
      - picoclaw-data:/home/picoclaw/.picoclaw
      # Mount config.json if you have custom model configuration
      # - ./config.json:/home/picoclaw/.picoclaw/config.json:ro
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  picoclaw-data:
