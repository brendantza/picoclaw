# ============================================================
# PicoClaw Docker Compose
# ============================================================
# 
# This uses the pre-built image from GitHub Container Registry.
# The image contains only the compiled binary, no source code.
#
# Usage:
#   docker-compose up -d
# ============================================================

services:
  picoclaw:
    image: ${PICOCLAW_IMAGE:-ghcr.io/brendantza/picoclaw:latest}
    container_name: picoclaw
    restart: unless-stopped
    
    ports:
      - "${PICOCLAW_PORT:-18790}:18790"
    
    environment:
      - PICOCLAW_HOME=/app/.picoclaw
    
    volumes:
      - picoclaw-data:/app/.picoclaw
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  picoclaw-data:
